server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Fix for large files / range requests in Docker alpine
    sendfile off;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|webp|mp3|mp4)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}